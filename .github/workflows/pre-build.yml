name: Pull-request builder
on:
  pull_request:
    types: [labeled, unlabeled, synchronize, opened, reopened]
    branches: [ 'main' ]
jobs:

  build:
    runs-on: ubuntu-latest
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'pre-release')
    strategy:
      matrix:
        go-version: [ '1.23.8' ]

    steps:
      - uses: actions/checkout@v5
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Setup Ko
        uses: ko-build/setup-ko@v0.6
      - name: Set up Kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Image
        env:
          IMAGE_REGISTRY_NAMESPACE: angeloxx
          IMAGE_REGISTRY: docker.io
          IMAGE_TAG_FORCED: latest
        run: |
          make build-image

      - name: Build Helm Chart
        env:
          IMAGE_REGISTRY_NAMESPACE: angeloxx
          IMAGE_REGISTRY: docker.io
          IMAGE_TAG_FORCED: latest
          HELM_TAG_FORCED: 0.0.0-latest
        run: |
          make helm
          make build-helm-upload